# nginx vhost — blog.luozichu.ink → Next.js standalone (127.0.0.1:3100)
# 部署位置：/etc/nginx/sites-available/blog.luozichu.ink → 软链到 sites-enabled/
# 本文件为初始 HTTP-only 版本；Certbot --nginx 会自动补全 443 ssl 块与 80→443 跳转。
# 红线：独立 vhost，绝不修改 gfx（luozichu.ink 主域）。

server {
    server_name blog.luozichu.ink;

    # 静态资源长缓存（Next.js 带 hash 文件名，可安全永久缓存）
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blog.luozichu.ink/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blog.luozichu.ink/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = blog.luozichu.ink) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name blog.luozichu.ink;
    return 404; # managed by Certbot


}